ai_usage_summary: |
  Built with AI assistance for architecture design, code authoring, and review,
  iterated by the team. A SMALL sample of candidate records (the first ~50 from
  the public bundle) was shared with the assistant for data analysis and to
  design the scoring taxonomies; the full candidate pool was processed only
  locally. The ranking pipeline itself makes NO LLM or network calls of any
  kind -- it is a deterministic feature scorer plus a re-ranking pass over
  locally precomputed sentence-transformer embeddings.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid, mostly-deterministic ranker with explicit reasoning. Five JD-aligned
  components -- role/career-trajectory (recency-weighted), trust-weighted skills
  (endorsements + duration + assessment scores defeat keyword stuffing),
  experience band, location, nice-to-haves -- combined with a multiplicative
  behavioral-availability modifier (open-to-work, last-active recency, recruiter
  response, notice period) and hard penalties for the JD's explicit do-not-wants
  (services-only careers, CV/speech without NLP/IR, LLM-wrapper-only, title-
  chasing). A high-precision profile-consistency check forces impossible
  "honeypot" profiles to the bottom. The role/title gate is the decisive defense
  against keyword-stuffer traps; an optional re-ranking pass over locally
  precomputed all-MiniLM-L6-v2 embeddings sharpens top-band ordering and catches
  plain-language fits. Validated against 10 JD-derived ranking invariants in lieu
  of a leaderboard. Ranking runs in ~25s over 100K candidates on CPU; 0 honeypots
  in top 100.

